# Fly.io config — Bússola Eleitoral API
# Scheduler precisa estar always-on (RSS/Câmara/Senado/Alertas)

app = "bussola-eleitoral-api"
primary_region = "gru"

[build]

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  ENABLE_SCHEDULERS = "1"
  DATABASE_URL = "sqlite:////data/bussola.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[mounts]
  source = "bussola_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
